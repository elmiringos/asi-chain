# Pull latest image and recreate compose services defined in host's compose_jobs.
---
- name: "Start node (pull latest + force recreate)"
  shell: "docker compose -f {{ item.compose_file }} up -d --pull always --force-recreate"
  args:
    chdir: "{{ item.work_dir }}"
  loop: "{{ compose_jobs }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  register: result
  failed_when: result.rc != 0
