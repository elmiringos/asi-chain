# Observer health check — two-stage verification:
#
# Stage 1 — log check (node reached Running state):
#   1. "First connection established"  — connected to bootstrap
#   2. "Received approved block"       — bootstrap/shard-name OK
#   3. "Rholang state received"        — LFS sync complete (slowest stage)
#   4. "All tasks started. Node is now running." — final indicator
#
#   Uses --since <StartedAt> to scope log grep to the current container run,
#   preventing false positives from logs of a previous restart.
#
# Stage 2 — HTTP API check (node is serving requests):
#   GET /api/last-finalized-block must return HTTP 200.
#   Confirms the node received blockchain state and transitioned to Running.
#
# On any failure: print diagnostics, stop container, restart, retry once.
# On second failure: hard fail.
---
- name: "Wait for observer to reach Running state"
  shell: |
    started=$(docker inspect -f '{{ '{{' }}.State.StartedAt{{ '}}' }}' observer 2>/dev/null) || exit 1
    docker logs observer --since "${started}" 2>&1 | grep -c "All tasks started. Node is now running."
  register: observer_running
  until: observer_running.stdout | int > 0
  retries: "{{ observer_check_retries }}"
  delay: "{{ observer_check_delay }}"
  changed_when: false
  ignore_errors: true

- name: "Verify observer HTTP API responds with last finalized block"
  uri:
    url: "http://127.0.0.1:{{ observer_http_port }}/api/last-finalized-block"
    method: GET
    status_code: 200
    timeout: 10
  register: observer_api_check
  until: observer_api_check.status == 200
  retries: 12
  delay: 5
  when: observer_running.stdout | int > 0
  ignore_errors: true

- name: "Observer did not reach Running state — restart and retry"
  when: >
    observer_running is failed or
    observer_running.stdout | int == 0 or
    (observer_api_check is not skipped and observer_api_check is failed)
  block:
    - name: "Diagnose: check last reached stage before restart"
      shell: |
        started=$(docker inspect -f '{{ '{{' }}.State.StartedAt{{ '}}' }}' observer 2>/dev/null) || started="1970-01-01T00:00:00Z"
        echo "=== Observer startup diagnostics (current run since ${started}) ==="
        echo -n "First connection established: "
        docker logs observer --since "${started}" 2>&1 | grep -c "First connection established" || true
        echo -n "Received approved block:      "
        docker logs observer --since "${started}" 2>&1 | grep -c "Received approved block from bootstrap" || true
        echo -n "Rholang state received:       "
        docker logs observer --since "${started}" 2>&1 | grep -c "Rholang state received" || true
        echo -n "Transition to Running:        "
        docker logs observer --since "${started}" 2>&1 | grep -c "Making a transition to Running state" || true
        echo -n "All tasks started:            "
        docker logs observer --since "${started}" 2>&1 | grep -c "All tasks started. Node is now running." || true
      register: observer_diag
      changed_when: false

    - name: "Print diagnostics"
      debug:
        msg: "{{ observer_diag.stdout_lines }}"

    - name: "Stop observer"
      shell: "docker compose -f {{ item.compose_file }} down {{ compose_down_flags }}"
      args:
        chdir: "{{ item.work_dir }}"
      loop: "{{ compose_jobs }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "Start observer"
      shell: "docker compose -f {{ item.compose_file }} up -d"
      args:
        chdir: "{{ item.work_dir }}"
      loop: "{{ compose_jobs }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "Wait for observer to reach Running state (retry)"
      shell: |
        started=$(docker inspect -f '{{ '{{' }}.State.StartedAt{{ '}}' }}' observer 2>/dev/null) || exit 1
        docker logs observer --since "${started}" 2>&1 | grep -c "All tasks started. Node is now running."
      register: observer_running_retry
      until: observer_running_retry.stdout | int > 0
      retries: "{{ observer_check_retries }}"
      delay: "{{ observer_check_delay }}"
      changed_when: false

    - name: "Verify observer HTTP API responds after restart"
      uri:
        url: "http://127.0.0.1:{{ observer_http_port }}/api/last-finalized-block"
        method: GET
        status_code: 200
        timeout: 10
      register: observer_api_check_retry
      until: observer_api_check_retry.status == 200
      retries: 12
      delay: 5
      when: observer_running_retry.stdout | int > 0
      ignore_errors: true

    - name: "Fail: observer did not reach Running state after restart"
      fail:
        msg: |
          [Stage: observer startup] Observer did not reach Running state after restart.

          Expected log sequence:
            1. "First connection established"           — bootstrap connectivity
            2. "Received approved block from bootstrap" — bootstrap / shard-name OK
            3. "Rholang state received"                 — LFS sync complete
            4. "All tasks started. Node is now running." — node fully up

          HTTP check: GET /api/last-finalized-block must return 200.

          Check logs: docker logs observer
          Hint: verify bootstrap address, shard-name, and network connectivity.
      when: >
        observer_running_retry.stdout | int == 0 or
        (observer_api_check_retry is not skipped and observer_api_check_retry is failed)
