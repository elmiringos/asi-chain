# Remove named volumes on docker compose down to ensure fresh state on next up
compose_down_flags: "-v"

compose_jobs:
  - name: "validator1 and validator2"
    work_dir: ~/actual-dev-chain
    compose_file: v1-v2.yml

validator_containers:
  - validator1
  - validator2

# Deploy target — validator1 HTTP API
validator1_http_port: 40413
