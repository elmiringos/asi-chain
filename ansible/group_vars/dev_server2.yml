# Remove named volumes on docker compose down to ensure fresh state on next up
compose_down_flags: "-v"

compose_jobs:
  - name: bootstrap
    work_dir: ~/actual-dev-chain
    compose_file: boot.yml
  - name: validator3
    work_dir: ~/actual-dev-chain
    compose_file: val3.yml

bootstrap_compose_jobs:
  - name: bootstrap
    work_dir: ~/actual-dev-chain
    compose_file: boot.yml

validator3_compose_jobs:
  - name: validator3
    work_dir: ~/actual-dev-chain
    compose_file: val3.yml

bootstrap_protocol_port: 40400

bootstrap_containers:
  - bootstrap

validator_containers:
  - validator3

deployer_work_dir: ~/actual-dev-chain
deployer_compose_file: deployer.yml
