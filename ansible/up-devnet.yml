---
# ============================================================
# ASI-Chain DEVNET — Start network
#
# Topology:
#   devnet_bootstrap  (devnet-1) — bootstrap (node0) + deployer bot
#   devnet_val1       (devnet-2) — validator1 (node0, dev-mode)
#   devnet_val2       (devnet-3) — validator2 (node0)
#   devnet_val3       (devnet-4) — validator3 (node0)
#
# Usage:
#   ansible-playbook -i inventory/devnet.ini up-devnet.yml
# ============================================================


# ---- Log trail: START --------------------------------------
- name: "Log trail"
  hosts: localhost
  gather_facts: false
  tasks:
    - include_tasks: tasks/log_trail.yml
      vars:
        trail_operation: UP
        trail_env: DEVNET
        trail_status: START


# ---- Step 1: bootstrap -------------------------------------
- name: "[devnet-1] Start bootstrap"
  hosts: devnet_bootstrap
  gather_facts: false
  tasks:
    - include_tasks: tasks/start_nodes.yml


# ---- Step 2: validators ------------------------------------
- name: "[devnet-2] Start validator1"
  hosts: devnet_val1
  gather_facts: false
  tasks:
    - include_tasks: tasks/start_nodes.yml

- name: "[devnet-3] Start validator2"
  hosts: devnet_val2
  gather_facts: false
  tasks:
    - include_tasks: tasks/start_nodes.yml

- name: "[devnet-4] Start validator3"
  hosts: devnet_val3
  gather_facts: false
  tasks:
    - include_tasks: tasks/start_nodes.yml


# ---- Step 3: health check on all nodes ---------------------
- name: "Health check — wait for Casper initialization"
  hosts: devnet_val1:devnet_val2:devnet_val3
  gather_facts: false
  tasks:
    - include_tasks: tasks/health_check_casper.yml


# ---- Step 4: deployer bot ----------------------------------
- name: "[devnet-1] Start deployer bot"
  hosts: devnet_bootstrap
  gather_facts: false
  tasks:
    - name: "Start deployer bot"
      shell: "docker compose -f {{ deployer_compose_file }} up -d"
      args:
        chdir: "{{ deployer_work_dir }}"
      changed_when: true
      register: r
      failed_when: r.rc != 0


# ---- Log trail: SUCCESS ------------------------------------
- name: "Log trail"
  hosts: localhost
  gather_facts: false
  tasks:
    - include_tasks: tasks/log_trail.yml
      vars:
        trail_operation: UP
        trail_env: DEVNET
        trail_status: SUCCESS
