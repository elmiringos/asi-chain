syntax = "proto3";
package casper.v1;

import "CasperMessage.proto";
import "ServiceError.proto";

service DeployService {
  rpc doDeploy(casper.DeployDataProto) returns (DeployResponse) {}
  rpc isFinalized(IsFinalizedQuery) returns (IsFinalizedResponse) {}
}

message DeployResponse {
  oneof message {
    servicemodelapi.ServiceError error = 1;
    string result = 2;
  }
}

message IsFinalizedQuery {
  string hash = 1;
}

message IsFinalizedResponse {
  oneof message {
    servicemodelapi.ServiceError error = 1;
    bool isFinalized = 2;
  }
}
