syntax = "proto3";
package casper;

message DeployDataProto {
  bytes  deployer              = 1;
  string term                  = 2;
  int64  timestamp             = 3;
  bytes  sig                   = 4;
  string sigAlgorithm          = 5;
  int64  phloPrice             = 7;
  int64  phloLimit             = 8;
  int64  validAfterBlockNumber = 10;
  string shardId               = 11;
  string language              = 12;
  int64  expirationTimestamp   = 13;
}
