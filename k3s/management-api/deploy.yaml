apiVersion: v1
kind: ServiceAccount
metadata:
  name: management-api
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: management-api
  namespace: asi-chain
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: management-api
  namespace: asi-chain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: management-api
subjects:
  - kind: ServiceAccount
    name: management-api
    namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-api
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-api
  template:
    metadata:
      labels:
        app: management-api
    spec:
      serviceAccountName: management-api
      containers:
        - name: api
          image: management-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: management-api
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: management-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
