# Headless services — для DNS между подами (bootstrap-0.bootstrap.asi-chain.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: bootstrap
  namespace: asi-chain
  labels:
    app: asi-chain
    role: bootstrap
spec:
  clusterIP: None
  selector:
    app: asi-chain
    role: bootstrap
  ports:
    - name: p2p
      port: 40400
    - name: kademlia
      port: 40404
