apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bootstrap-data
  namespace: asi-chain
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
