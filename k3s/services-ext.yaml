# NodePort services — внешний доступ к нодам (только для main namespace asi-chain)
apiVersion: v1
kind: Service
metadata:
  name: bootstrap-ext
  namespace: asi-chain
spec:
  type: NodePort
  selector:
    app: asi-chain
    role: bootstrap
  ports:
    - name: http
      port: 40403
      targetPort: 40403
      nodePort: 30003
    - name: grpc-ext
      port: 40401
      targetPort: 40401
      nodePort: 30001
    - name: grpc-int
      port: 40402
      targetPort: 40402
      nodePort: 30002
---
