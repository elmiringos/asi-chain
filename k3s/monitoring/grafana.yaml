apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-firefly
              mountPath: /var/lib/grafana/dashboards
            - name: dashboard-k6-perf-report
              mountPath: /var/lib/grafana/dashboards/k6-perf-report
            - name: dashboard-k6-http-load
              mountPath: /var/lib/grafana/dashboards/k6-http-load
            - name: data
              mountPath: /var/lib/grafana
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-firefly
          configMap:
            name: grafana-dashboard-firefly
        - name: dashboard-k6-perf-report
          configMap:
            name: grafana-dashboard-k6-perf-report
        - name: dashboard-k6-http-load
          configMap:
            name: grafana-dashboard-k6-http-load
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k6-perf-report
  namespace: monitoring
data:
  k6-perf-report.json: |
    {
      "uid": "k6-perf-report",
      "title": "k6 Perf Report",
      "tags": ["k6"],
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "testid",
            "label": "Test Run",
            "type": "query",
            "datasource": { "uid": "prometheus" },
            "query": "label_values(k6_test_confirmed_total, testid)",
            "refresh": 2,
            "sort": 4,
            "includeAll": false,
            "current": {}
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "name": "k6 test runs",
            "datasource": { "uid": "-- Grafana --" },
            "enable": true,
            "iconColor": "blue",
            "tags": ["k6"],
            "type": "tags"
          }
        ]
      },
      "panels": [
        {
          "id": 1, "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "type": "stat", "title": "Successful Deploys",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": { "steps": [{ "color": "green", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_confirmed_total{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 2, "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "type": "stat", "title": "Failed Deploys",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_unconfirmed_total{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 3, "gridPos": { "h": 6, "w": 24, "x": 0, "y": 6 },
          "type": "stat", "title": "Blocks Produced During Test Run",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_blocks_produced{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 4, "gridPos": { "h": 6, "w": 12, "x": 0, "y": 12 },
          "type": "stat", "title": "p95 Confirmation Time",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "yellow" },
              "thresholds": { "steps": [{ "color": "yellow", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_confirmation_p95_ms{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 5, "gridPos": { "h": 6, "w": 6, "x": 12, "y": 12 },
          "type": "stat", "title": "Avg Deploys per Block",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_avg_deploys_per_block{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 13, "gridPos": { "h": 6, "w": 6, "x": 18, "y": 12 },
          "type": "stat", "title": "Deploy Throughput",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 2,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_deploy_throughput_per_sec{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 10, "gridPos": { "h": 6, "w": 12, "x": 0, "y": 18 },
          "type": "stat", "title": "Deploy Payload Size (avg)",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "purple" },
              "thresholds": { "steps": [{ "color": "purple", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_payload_bytes_avg{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 11, "gridPos": { "h": 6, "w": 12, "x": 12, "y": 18 },
          "type": "stat", "title": "Block Creation Time (avg)",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_test_avg_block_creation_time_ms{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 7, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "type": "timeseries", "title": "CPU Cores Used by Pod",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "decimals": 2, "min": 0, "custom": { "lineWidth": 2 } } },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"asi-chain\", pod=~\"validator.*|bootstrap.*|observer.*\", container!=\"\", container!=\"POD\"}[1m])",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 8, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "type": "timeseries", "title": "Memory by Pod",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes", "min": 0, "custom": { "lineWidth": 2 } } },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"asi-chain\", pod=~\"validator.*|bootstrap.*|observer.*\", container!=\"\", container!=\"POD\"}",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 12, "gridPos": { "h": 3, "w": 24, "x": 0, "y": 32 },
          "type": "table", "title": "Experiment Config",
          "datasource": { "uid": "prometheus" },
          "options": {
            "footer": { "show": false },
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Time" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "Value" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "__name__" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "job" }, "properties": [{ "id": "custom.hidden", "value": true }] },
              { "matcher": { "id": "byName", "options": "testid" }, "properties": [{ "id": "custom.hidden", "value": true }] }
            ]
          },
          "targets": [
            {
              "expr": "k6_experiment_config{testid=\"$testid\"}",
              "instant": true,
              "legendFormat": "",
              "format": "table"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k6-http-load
  namespace: monitoring
data:
  k6-http-load.json: |
    {
      "uid": "k6-http-load",
      "title": "k6 HTTP Load",
      "tags": ["k6"],
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "testid",
            "label": "Test Run",
            "type": "query",
            "datasource": { "uid": "prometheus" },
            "query": "label_values(k6_http_reqs_total, testid)",
            "refresh": 2,
            "sort": 4,
            "includeAll": false,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1, "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "type": "stat", "title": "Total Requests",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_http_reqs_total{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 2, "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "type": "stat", "title": "Failure Rate",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_http_req_failed{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 3, "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "type": "stat", "title": "p95 Request Duration",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 0,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 5000 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_http_req_duration_p95{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 4, "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "type": "stat", "title": "Active VUs",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "purple" },
              "thresholds": { "steps": [{ "color": "purple", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_vus{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 5, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "type": "timeseries", "title": "Requests per Second",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps", "min": 0 } },
          "targets": [
            {
              "expr": "rate(k6_http_reqs_total{testid=\"$testid\"}[1m])",
              "legendFormat": "rps"
            }
          ]
        },
        {
          "id": 6, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "type": "timeseries", "title": "Request Duration",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms", "min": 0 } },
          "targets": [
            {
              "expr": "k6_http_req_duration_p50{testid=\"$testid\"}",
              "legendFormat": "p50"
            },
            {
              "expr": "k6_http_req_duration_p95{testid=\"$testid\"}",
              "legendFormat": "p95"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
