apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-firefly
              mountPath: /var/lib/grafana/dashboards
            - name: dashboard-k6-report
              mountPath: /var/lib/grafana/dashboards/k6-report
            - name: data
              mountPath: /var/lib/grafana
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-firefly
          configMap:
            name: grafana-dashboard-firefly
        - name: dashboard-k6-report
          configMap:
            name: grafana-dashboard-k6-report
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k6-report
  namespace: monitoring
data:
  k6-test-report.json: |
    {
      "uid": "k6-test-report",
      "title": "k6 Test Report",
      "tags": ["k6"],
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "testid",
            "label": "Test Run",
            "type": "query",
            "datasource": { "uid": "prometheus" },
            "query": "label_values(k6_http_reqs_total, testid)",
            "refresh": 2,
            "sort": 4,
            "includeAll": false,
            "current": {}
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "name": "k6 test runs",
            "datasource": { "uid": "-- Grafana --" },
            "enable": true,
            "iconColor": "blue",
            "tags": ["k6"],
            "type": "tags"
          }
        ]
      },
      "panels": [
        {
          "id": 1, "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "type": "stat", "title": "Successful Deploys",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": { "steps": [{ "color": "green", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "increase(k6_http_reqs_total{testid=\"$testid\"}[$__range]) - increase(k6_http_req_failed_total{testid=\"$testid\"}[$__range])",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 2, "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "type": "stat", "title": "Failed Deploys",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "increase(k6_http_req_failed_total{testid=\"$testid\"}[$__range])",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 3, "gridPos": { "h": 6, "w": 24, "x": 0, "y": 6 },
          "type": "stat", "title": "Blocks Produced During Test Run",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "max(k6_blockchain_block_number{testid=\"$testid\"}) - min(k6_blockchain_block_number{testid=\"$testid\"})",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 4, "gridPos": { "h": 6, "w": 12, "x": 0, "y": 12 },
          "type": "stat", "title": "Confirmed Deploys",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": { "steps": [{ "color": "green", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "increase(k6_deploy_confirmed_total{testid=\"$testid\"}[$__range])",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 5, "gridPos": { "h": 6, "w": 12, "x": 12, "y": 12 },
          "type": "stat", "title": "Avg Deploys per Block",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_block_deploy_count_sum{testid=\"$testid\"} / k6_block_deploy_count_count{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 6, "gridPos": { "h": 8, "w": 24, "x": 0, "y": 18 },
          "type": "timeseries", "title": "Deploys per Block over Time",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "decimals": 0, "min": 0 } },
          "options": { "tooltip": { "mode": "single" } },
          "targets": [
            {
              "expr": "k6_block_deploy_count_p50{testid=\"$testid\"}",
              "legendFormat": "p50"
            },
            {
              "expr": "k6_block_deploy_count_p95{testid=\"$testid\"}",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 9, "gridPos": { "h": 6, "w": 8, "x": 0, "y": 26 },
          "type": "stat", "title": "Max Deploys in One Block",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "orange" },
              "thresholds": { "steps": [{ "color": "orange", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_block_deploy_count_max{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 10, "gridPos": { "h": 6, "w": 8, "x": 8, "y": 26 },
          "type": "stat", "title": "Deploy Payload Size (p50)",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "purple" },
              "thresholds": { "steps": [{ "color": "purple", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_deploy_payload_bytes_p50{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 11, "gridPos": { "h": 6, "w": 8, "x": 16, "y": 26 },
          "type": "stat", "title": "Block Creation Time (p50)",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": { "steps": [{ "color": "blue", "value": 0 }] }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [
            {
              "expr": "k6_block_creation_time_ms_p50{testid=\"$testid\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 7, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "type": "timeseries", "title": "CPU % by Node",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100, "min": 0 } },
          "targets": [
            {
              "expr": "100 - (avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) * 100)",
              "legendFormat": "{{ node }}"
            }
          ]
        },
        {
          "id": 8, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "type": "timeseries", "title": "Memory % by Node",
          "datasource": { "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100, "min": 0 } },
          "targets": [
            {
              "expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "{{ node }}"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
