x-rnode: &default-rnode
  image: f1r3flyindustries/f1r3fly-scala-node
  user: root
  networks:
    - f1r3fly

services:
  validator:
    <<: *default-rnode
    container_name: validator
    command:
      [
        "run",
        "--host=$VALIDATOR_HOST",
        "-Dlogback.configurationFile=/var/lib/rnode/logback.xml",
      ]
    ports:
      # Setup your node's ports here
      - "40400:40400"
      - "40401:40401"
      - "40402:40402"
      - "40403:40403"
      - "40404:40404"
      - "40405:40405"
    volumes:
      - ./data/validator:/var/lib/rnode/
      - ./conf/validator.conf:/var/lib/rnode/rnode.conf
      # Next two lines below must be commented to generate a new key pair for the node.
      # - ./conf/validator.certificate.pem:/var/lib/rnode/node.certificate.pem
      # - ./conf/validator.key.pem:/var/lib/rnode/node.key.pem
      - ./conf/logback.xml:/var/lib/rnode/logback.xml

networks:
  f1r3fly:
    external: true
    name: docker_f1r3fly
