<!DOCTYPE html>
<html>
<head>
    <title>Test LocalStorage Crash</title>
</head>
<body>
    <h1>LocalStorage Network Test</h1>
    <button onclick="saveNetworks()">Save Networks</button>
    <button onclick="loadNetworks()">Load Networks</button>
    <button onclick="clearStorage()">Clear Storage</button>
    <button onclick="simulateRefresh()">Simulate Refresh</button>
    <pre id="output"></pre>
    
    <script>
        const NETWORKS_STORAGE_KEY = 'asi_wallet_networks';
        
        function log(message) {
            document.getElementById('output').textContent += message + '\n';
        }
        
        function saveNetworks() {
            const networks = [
                {
                    id: 'custom',
                    name: 'Custom Network',
                    url: 'http://localhost:40403',
                    readOnlyUrl: 'http://localhost:40453',
                    shardId: 'root',
                },
                {
                    id: 'mainnet',
                    name: 'Firefly Mainnet',
                    url: 'https://146.235.215.215:443',
                    readOnlyUrl: 'https://146.235.215.215:443',
                    shardId: '',
                },
                {
                    id: 'custom-1234567890',
                    name: 'New Custom Network',
                    url: 'https://my-new-network.com:443',
                    readOnlyUrl: 'https://my-new-network.com:443',
                    shardId: 'custom',
                }
            ];
            
            try {
                localStorage.setItem(NETWORKS_STORAGE_KEY, JSON.stringify(networks));
                log('Saved networks: ' + JSON.stringify(networks, null, 2));
            } catch (error) {
                log('Error saving: ' + error.message);
            }
        }
        
        function loadNetworks() {
            try {
                const stored = localStorage.getItem(NETWORKS_STORAGE_KEY);
                if (stored) {
                    const networks = JSON.parse(stored);
                    log('Loaded networks: ' + JSON.stringify(networks, null, 2));
                } else {
                    log('No networks in storage');
                }
            } catch (error) {
                log('Error loading: ' + error.message);
            }
        }
        
        function clearStorage() {
            localStorage.removeItem(NETWORKS_STORAGE_KEY);
            log('Cleared storage');
        }
        
        function simulateRefresh() {
            log('Simulating refresh...');
            loadNetworks();
            setTimeout(() => {
                log('Saving during "refresh"...');
                saveNetworks();
            }, 100);
        }
        
        // Load on page load
        window.onload = function() {
            log('Page loaded');
            loadNetworks();
        };
    </script>
</body>
</html>
