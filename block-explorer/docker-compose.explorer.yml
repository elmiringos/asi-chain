version: '3.8'

services:
  block-explorer:
    build: .
    container_name: asi-block-explorer
    ports:
      - "5001:5001"  # Web interface
    volumes:
      # Persistent data storage
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount Docker socket to access host's Docker
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Configuration via environment variables
      - RNODE_CONTAINER_NAME=rnode.readonly
      - VALIDATOR_CONTAINER_NAME=rnode.validator1
      - RNODE_NETWORK=asi-chain-net
      - DB_PATH=/app/data/asi-chain.db
      - UPDATE_INTERVAL=5
      - WEB_PORT=5001
      - EXPLORE_DEPLOY_URL=http://host.docker.internal:40453
    # Use host network mode to access containers on host
    # network_mode: "host"  # Option 1: Full host access
    
    # Option 2: Custom network with external access
    networks:
      - explorer-net
    extra_hosts:
      # Allow access to host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  explorer-net:
    driver: bridge
    name: explorer-network